services:
  itsyconnect:
    image: ghcr.io/nickustinov/itsyconnect:latest
    # build: .  # uncomment to build locally
    ports:
      - "3000:3000"
    environment:
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
    volumes:
      - data:/app/data
    restart: unless-stopped

volumes:
  data:
